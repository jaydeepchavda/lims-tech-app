<div class="container-fluid py-0 px-0 shadow-sm border border-secondary border-opacity-25 mt-3">
  
  <div class="bg-white p-4 mx-2 my-2 border rounded-1">
    
    <form [formGroup]="summaryForm" (ngSubmit)="onShow()">
      
      <div class="row justify-content-center mb-2">
        <div class="col-md-8 col-lg-6">
          
          <div class="row mb-2 align-items-center">
            <label class="col-sm-4 text-end fw-bold small pe-3">From :</label>
            <div class="col-sm-5 d-flex align-items-center gap-2">
              <input type="date" formControlName="from" class="form-control form-control-sm border-secondary shadow-none rounded-0">
            </div>
          </div>

          <div class="row mb-2 align-items-center">
            <label class="col-sm-4 text-end fw-bold small pe-3">To :</label>
            <div class="col-sm-5 d-flex align-items-center gap-2">
              <input type="date" formControlName="to" class="form-control form-control-sm border-secondary shadow-none rounded-0">
            </div>
          </div>

          <div class="row mb-3 align-items-center">
            <label class="col-sm-4 text-end fw-bold small pe-3">Client</label>
            <div class="col-sm-8 d-flex gap-3 align-items-center">
              <div class="form-check m-0 d-flex align-items-center gap-1">
                <input class="form-check-input border-secondary" type="radio" formControlName="clientType" id="epa" value="EPA">
                <label class="form-check-label small fw-bold text-muted" for="epa">EPA</label>
              </div>
              <div class="form-check m-0 d-flex align-items-center gap-1">
                <input class="form-check-input border-secondary" type="radio" formControlName="clientType" id="pseg" value="PSEG">
                <label class="form-check-label small fw-bold text-muted" for="pseg">PSEG</label>
              </div>
              <div class="form-check m-0 d-flex align-items-center gap-1">
                <input class="form-check-input border-secondary" type="radio" formControlName="clientType" id="all" value="All">
                <label class="form-check-label small fw-bold text-muted" for="all">All</label>
              </div>
            </div>
          </div>

          <div class="row mb-4">
            <div class="col-sm-5 offset-sm-4">
              <button type="submit" class="btn btn-sm px-3 fw-bold border-dark rounded-0 shadow-sm" 
                      style="background-color: #dcd0b9; font-size: 11px;">
                Show
              </button>
            </div>
          </div>

        </div>
      </div>

      <div class="row border-top border-secondary border-opacity-25 pt-4">
        <div class="col-12 d-flex flex-column align-items-center gap-1">
          @for (link of summaryLinks(); track link.label) {
            <a href="javascript:void(0)" 
               (click)="onLinkClick(link.type)"
               class="text-primary small text-decoration-underline fw-semibold hover-dark">
              {{ link.label }}
            </a>
          }
        </div>
      </div>

    </form>
  </div>
</div>
