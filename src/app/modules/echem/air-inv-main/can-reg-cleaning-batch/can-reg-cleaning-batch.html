<div class="main-container  py-3 ">
    <div class="container border border-dark ">
        <div class="lims-header  border-bottom border-dark">
            New Batch Creation
        </div>

        <div class="row mb-0 align-items-center">
            <label class="col-sm-5 col-form-label text-end small fw-semibold">Types of canister :</label>
            <div class="col-sm-7 d-flex align-items-center">
                <div class="form-check form-check-inline mb-0 me-2">

                    <input class="form-check-input mt-1 border-dark-subtle" type="radio" name="canisterSize" id="6L" value="6L" />
                    <label class="form-check-label small ms-1" for="6L" >6L</label>
                </div>
                <div class="form-check form-check-inline mb-0">
                    <input class="form-check-input mt-1 border-dark-subtle" type="radio" name="canisterSize" id="14L"
                        value="14L" />
                    <label class="form-check-label small ms-1" for="14L" >14L</label>
                </div>
            </div>
            <div class="row mb-0 align-items-center">
                <label class="col-sm-5 col-form-label text-end fw-semibold small  ms-2">Canister Batch :</label>
                <div class="col-sm-2">
                    <input type="text" class="form-control form-control-sm border-secondary-subtle bg-light"  />
                </div>
            </div>
            <div class="row mb-0 align-items-center">
                <label class="col-sm-5 col-form-label text-end fw-semibold small  ms-2">Cleaning Date :</label>
                <div class="col-sm-2">
                    <input type="date" class="form-control form-control-sm border-secondary-subtle bg-light"  />
                </div>
            </div>
            <div class="row mb-0 align-items-center">
                <label class="col-sm-5 col-form-label text-end fw-semibold small  ms-2">Oven Temprature :</label>
                <div class="col-sm-2">
                    <input type="text" class="form-control form-control-sm border-secondary-subtle bg-light"  />
                </div>
            </div>
            <div class="batch-buttons text-center m-2 ">
                <button type="submit" class="btn btn-warning btn-sm p-3 py-0 border-dark fw-bold m-1">Next >></button>
                <button type="submit" class="btn btn-warning btn-sm p-3 py-0 border-dark fw-bold m-1">Cancle</button>
                <button type="submit" class="btn btn-warning btn-sm p-3 py-0 border-dark fw-bold m-1">Update Cleaning Date & Oven Temperature </button>
                
            </div>
        </div>
    </div>
</div>
