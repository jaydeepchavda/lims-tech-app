<div class="container-fluid mt-3">
    <div class="mx-auto w-75 border shadow-sm rounded bg-white">

        <div class="d-flex justify-content-between align-items-center px-3 py-1 bg-secondary-subtle border-bottom">
            <span class="fw-bold small text-dark">User List</span>
            <div class="userlink d-flex gap-4">
                <a class="link-dark small fw-bold" [routerLink]="['/lims/echem/admin']">User Original Password </a>
                <a class="link-dark small fw-bold" [routerLink]="['/lims/echem/admin']">Add New User</a>

            </div>

        </div>

        <div class="p-3">
            <table class="table table-sm table-bordered border-secondary-subtle mb-0 align-middle">
                <thead class="text-center bg-info-subtle">
                    <tr class="small">
                        <th class="py-2 text-decoration-underline">User</th>
                        <th class="py-2 text-decoration-underline">Designation</th>
                        <th class="py-2">Firm</th>
                        <th class="py-2">E-mail</th>
                        <th class="py-2" colspan="2">Actions</th>
                    </tr>
                </thead>
                <tbody class="text-center small">
                    @for (user of userInfo(); track user.id) {
                    <tr>
                        <td class="py-2">{{ user.userName }}</td>
                        <td class="py-2 text-muted text-start ps-3">{{ user.Designation }}</td>
                        <td class="py-2 text-muted text-start ps-3">{{ user.firm }}</td>
                        <td class="py-2 text-muted text-start ps-3">{{ user.email }}</td>

                        <td class="text-center">
                            <button class="btn btn-outline-primary btn-sm" (click)="onEdit(user.id)">Edit</button>
                        </td>
                        <td class="text-center">
                            <button class="btn btn-outline-danger btn-sm" (click)="onDelete(user.id)">Delete</button>
                        </td>
                    </tr>
                    }
                </tbody>
            </table>
        </div>
    </div>
</div>
