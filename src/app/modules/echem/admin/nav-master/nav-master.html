<div class="container-fluid mt-3">
    <div class="mx-auto w-100 border shadow-sm rounded bg-white overflow-hidden">

        <div class="d-flex justify-content-between align-items-center px-3 py-1 bg-secondary-subtle border-bottom">
            <span class="fw-bold small text-dark">Navigation Master</span>
        </div>

        <div class="p-4 bg-white">
            <div class="row row-cols-1 row-cols-md-3 g-3">

                <div class="col">
                    <div class="row align-items-center mb-2">
                        <label class="col-5 text-end fw-bold small">Module Name :</label>
                        <div class="col-7">
                            <select class="form-select form-select-sm border-secondary-subtle"
                                (change)="onModuleChange($event)">
                                <option selected>---SELECT---</option>
                                @for(module of moduleOptions; track $index){
                                <option [value]="module">{{module}}</option>
                                }
                            </select>
                        </div>
                    </div>
                    <div class="row align-items-center mb-2">
                        <label class="col-5 text-end fw-bold small">Navigation No :</label>
                        <div class="col-7">
                            <input type="text" class="form-control form-control-sm border-secondary-subtle">
                        </div>
                    </div>
                    <div class="row align-items-center">
                        <label class="col-5 text-end fw-bold small">URLLink :</label>
                        <div class="col-7">
                            <input type="text" class="form-control form-control-sm border-secondary-subtle">
                        </div>
                    </div>
                </div>

                <div class="col">
                    <div class="row align-items-center mb-2 invisible d-none d-md-flex">
                        <label class="col-5">Spacer</label>
                        <div class="col-7"><input class="form-control form-control-sm"></div>
                    </div>
                    <div class="row align-items-center mb-2">
                        <label class="col-5 text-end fw-bold small">Page Title :</label>
                        <div class="col-7">
                            <input type="text" class="form-control form-control-sm border-secondary-subtle">
                        </div>
                    </div>
                    <div class="row align-items-center">
                        <label class="col-5 text-end fw-bold small">Sequence No :</label>
                        <div class="col-4">
                            <input type="text" class="form-control form-control-sm border-secondary-subtle">
                        </div>
                    </div>
                </div>

                <div class="col">
                    <div class="row align-items-center mb-2 invisible d-none d-md-flex">
                        <label class="col-5">Spacer</label>
                        <div class="col-7"><input class="form-control form-control-sm"></div>
                    </div>
                    <div class="row align-items-center mb-2">
                        <label class="col-5 text-end fw-bold small">Page Name :</label>
                        <div class="col-7">
                            <input type="text" class="form-control form-control-sm border-secondary-subtle">
                        </div>
                    </div>
                    <div class="row align-items-center">
                        <label class="col-5 text-end fw-bold small">Is NewTab :</label>
                        <div class="col-7">
                            <input type="checkbox" class="form-check-input border-secondary">
                        </div>
                    </div>
                </div>
            </div>

            <div class="text-center mt-4">
                <button class="btn btn-warning btn-sm px-5 fw-bold text-dark shadow-sm border-0 bg-gradient">
                    Save
                </button>
            </div>
        </div>


        @if(isNavAvailableToShow()){
        <div class="p-3 bg-white border-top">
            <div class="table-responsive">
                <table class="table table-sm table-bordered align-middle mb-0">
                    <thead class="text-dark" style="background-color: #d1e2e9;">
                        <tr class="small fw-bold">
                            <th class="text-center" style="width: 40px;"><input type="checkbox"
                                    class="form-check-input border-secondary"></th>
                            <th class="ps-2">Navigation No</th>
                            <th class="ps-2">Page Title</th>
                            <th class="ps-2">Page Name</th>
                            <th class="ps-2">Sequence No</th>
                            <th class="ps-2">Is NewTab</th>
                            <th class="ps-2">URL Link</th>
                        </tr>
                    </thead>
                    <tbody class="small">
                        @for(row of navigationRecords(); track row.navNo){
                        <tr>
                            <td class="text-center bg-light">
                                <input type="checkbox" class="form-check-input border-secondary">
                            </td>

                            <td class="ps-2 fw-bold text-dark">{{row.navNo}}</td>

                            <td class="p-1">
                                <input type="text" class="form-control form-control-sm border-secondary-subtle"
                                    [value]="row.title">
                            </td>

                            <td class="ps-2 fw-bold text-dark">{{row.name}}</td>

                            <td class="p-1">
                                <input type="number"
                                    class="form-control form-control-sm border-secondary-subtle text-center"
                                    [value]="row.seq" style="width: 60px;">
                            </td>

                            <td class="text-center">
                                <input type="checkbox" class="form-check-input border-secondary" [checked]="row.isNew">
                            </td>

                            <td class="ps-2 text-muted small">
                                {{row.url}}
                            </td>
                        </tr>
                        }
                    </tbody>
                </table>
            </div>

            <div class="text-center mt-3">
                <button class="btn btn-warning btn-sm px-5 fw-bold text-dark shadow-sm border-0 bg-gradient" (click)="updateNavigation()">
                    Update
                </button>
            </div>
        </div>
        }
        @else
        {
        <div class="p-3 bg-white border-top">
            <div class="border p-1 px-3 bg-light rounded shadow-sm fw-bold small text-dark">
                No Records Found.
            </div>
        </div>

        }
    </div>
</div>
