<div class="container-fluid mt-3">
  <div class="mx-auto w-100 border shadow-sm rounded bg-white overflow-hidden">
    
    <div class="px-3 py-1 fw-bold small border-bottom" style="background-color: #f5f2e1;">
      Search Details
    </div>

    <div class="p-4 bg-white">
      <div class="row g-3">
        
        <div class="col-md-4">
          <div class="row align-items-center mb-2">
            <label class="col-4 text-end fw-bold small">From :</label>
            <div class="col-8">
              <input type="date" class="form-control form-control-sm border-secondary-subtle" 
                     [ngModel]="fromDate()" (ngModelChange)="fromDate.set($event)">
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="row align-items-center mb-2">
            <label class="col-4 text-end fw-bold small">To :</label>
            <div class="col-8">
              <input type="date" class="form-control form-control-sm border-secondary-subtle"
                     [ngModel]="toDate()" (ngModelChange)="toDate.set($event)">
            </div>
          </div>
          <div class="row align-items-center mb-2">
            <label class="col-4 text-end fw-bold small">System :</label>
            <div class="col-8">
              <select class="form-select form-select-sm border-secondary-subtle">
                <option selected>Pesticides</option>
                <option>Metals</option>
                <option>Volatiles</option>
              </select>
            </div>
          </div>
          <div class="row align-items-center mb-2">
            <label class="col-4 text-end fw-bold small">Status :</label>
            <div class="col-8">
              <select class="form-select form-select-sm border-secondary-subtle">
                <option selected>Open</option>
                <option>Closed</option>
                <option>In-Progress</option>
              </select>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="row align-items-center mb-2">
            <label class="col-4 text-end fw-bold small">OrderID :</label>
            <div class="col-8">
              <input type="text" class="form-control form-control-sm border-secondary-subtle">
            </div>
          </div>
        </div>
      </div>

      <div class="text-center mt-3">
        <button class="btn btn-sm px-5 fw-bold text-dark border-secondary shadow-sm" 
                style="background-color: #e0dbb8;" (click)="onShowClick()">
          Show
        </button>
      </div>
    </div>
  </div>

  @if (isDataVisible()) {
    <div class="mt-3">
        <div class="alert alert-light border text-center small text-muted">
            <i class="bi bi-info-circle me-1"></i> Showing records from {{ fromDate() }} to {{ toDate() }}
        </div>
    </div>
  }
</div>
