<div class="container-fluid mt-3">
  <div class="mx-auto w-75 border shadow-sm rounded bg-white">
    
    <div class="d-flex justify-content-between align-items-center px-3 py-1 bg-secondary-subtle border-bottom">
      <span class="fw-bold small text-dark">Role List</span>
      <a href="#" class="link-dark small fw-bold">Add New Role</a>
    </div>

    <div class="p-3">
      <table class="table table-sm table-bordered border-secondary-subtle mb-0 align-middle">
        <thead class="text-center bg-info-subtle">
          <tr class="small">
            <th class="py-2 text-decoration-underline">Role Name</th>
            <th class="py-2 text-decoration-underline">Description</th>
            <th class="py-2">Edit</th>
            <th class="py-2">Delete</th>
          </tr>
        </thead>
        <tbody class="text-center small">
          @for (role of roles(); track role.name) {
          <tr>
            <td class="py-2">{{ role.name }}</td>
            <td class="py-2 text-muted text-start ps-3">{{ role.description }}</td>
            
            <td class="text-center">
                <button class="btn btn-outline-primary " (click)="onEdit(role)">Edit</button>
            </td>
            
            <td class="text-center">
                <i class="bi bi-x-square text-danger" >Delete</i>
            </td>
          </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
