<!-- Main Content -->
<div class="container-fluid mt-4">
  <div class="row">

    <!-- Left Sidebar -->
    <div class="col-md-3">
      <div class="card">
        <div class="card-body text-center">
          <img src="https://via.placeholder.com/80" class="rounded-circle mb-2" />
          <h5 class="mb-0">Jaydip Chavda</h5>
          <small class="text-muted">Frontend Developer</small>

          <hr />

          <p class="mb-1 fw-semibold">Connections</p>
          <p class="text-primary fw-bold">250+</p>
        </div>
      </div>
    </div>

    <!-- Center Feed -->
    <div class="col-md-6">
      <div class="card mb-3">
        <div class="card-body">
          <textarea class="form-control" rows="3" placeholder="Start a post..."></textarea>
          <div class="text-end mt-2">
            <button class="btn btn-primary btn-sm">Post</button>
          </div>
        </div>
      </div>

      <!-- Sample Post -->
      <div class="card mb-3">
        <div class="card-body">
          <h6 class="fw-bold mb-0">Jaydip chavda</h6>
          <small class="text-muted">2h ago</small>

          <p class="mt-2">
            Excited to share my new Angular project 🚀
          </p>

          <div class="d-flex justify-content-between text-muted">
            <span>👍 Like</span>
            <span>💬 Comment</span>
            <span>↗ Share</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Sidebar -->
    <div class="col-md-3">
      <div class="card">
        <div class="card-body">
          <h6 class="fw-bold">People you may know</h6>

          <div class="d-flex align-items-center mt-3">
            <img src="https://via.placeholder.com/40" class="rounded-circle me-2" />
            <div>
              <p class="mb-0 fw-semibold">Amit Patel</p>
              <small class="text-muted">Backend Dev</small>
            </div>
          </div>

          <div class="d-flex align-items-center mt-3">
            <img src="https://via.placeholder.com/40" class="rounded-circle me-2" />
            <div>
              <p class="mb-0 fw-semibold">Sneha Mehta</p>
              <small class="text-muted">UI Designer</small>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="container mt-5">

          </button>

      </div>
    </div> -->
  </div>
</div>
