<div class="container-fluid">
    <div class="row">
        <h4 class="text-center text-primary mb-4 p-3">Cooler Entry Process</h4>
        <div class="back-button text-center mb-2">
            <button class="btn btn-outline-primary btn" (click)="backToCoolerEntryPage()">Back</button>
        </div>

        <div class="col-lg-12 border border-3 rounded p-3 bg-light  text-center">
            <div class="cooler-entry-process-content ">
                <div class="link-buttons d-flex gap-3 justify-content-center mb-2">
                    <button class="btn btn-link fw-semibold px-0  text-decoration-none p-2" (click)="enterCoolerId()">
                        Enter Cooler ID
                    </button>
                    <button class="btn btn-link fw-semibold px-0  text-decoration-none p-2"
                        (click)="viewCoolerReport()">
                        View Cooler Report
                    </button>

                </div>
                <div class="row justify-content-center">
                    <div class="col-auto d-flex align-items-center justify-content-center mb-2">

                        <div class="form-check form-check-inline mb-0 me-3">
                            <input class="form-check-input border-dark-subtle" type="radio" name="typeOfOrganic"
                                id="epaOrganic" value="epaOrganic" />
                            <label class="form-check-label fw-semibold ms-1 " for="epaOrganic">
                                EPA ORG
                            </label>
                        </div>

                        <div class="form-check form-check-inline mb-0">
                            <input class="form-check-input border-dark-subtle" type="radio" name="typeOfOrganic"
                                id="epaInorganic" value="epaInorganic" />
                            <label class="form-check-label fw-semibold ms-1" for="epaInorganic">
                                EPA INORG
                            </label>
                        </div>

                    </div>
                </div>
                <button class="btn btn-link fw-semibold px-0   p-2" (click)="viewCoverPage()">
                    View Cover Page
                </button>
            </div>


        </div>
        <div class="coolers-insert-content p-4 text-center">
            <div class="row justify-content-center align-items-center">
                <label class="col-auto col-form-label text-end small fw-semibold">How many Cooler you want to insert ?  :</label>

                <div class="col-auto">
                    <input type="text" class="form-control form-control-sm border-primary-subtle bg-light text-center"
                        formControlName="orderId" style="width: 150px;" />
                </div>
            </div>
            <button class="btn btn-primary btn-sm m-2" (click)="updateCoolerEntry()">Update </button>
            <div class="row justify-content-center align-items-center">
                <label class="col-auto col-form-label text-end  fw-bold">Customer ID :</label>
                <label class="col-auto col-form-label text-start  fw-bold">{{ CusotmerId }}</label>
            </div>
            <div class="row justify-content-center align-items-center">
                <label class="col-auto col-form-label text-end  fw-bold">Customer Name :</label>
                <label class="col-auto col-form-label text-start  fw-bold">{{ CusotmerName }}</label>
            </div>
        </div>

    </div>
</div>
