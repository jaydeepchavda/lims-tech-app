<div class="container-fluid">
    @if (!isShowNewCoolerEntry()) {
    <div class="row justify-content-center">
        <div class="col-lg-12 p-2">
            <div class="main-order-content border rounded p-3 bg-light shadow-sm">
                <div class="order-select-content d-flex align-items-center justify-content-center mb-3">

                    <label class="small fw-semibold me-2">Order ID :</label>
                    <div style="width: 200px;" class="me-3">
                        <select class="form-select form-select-sm border-dark-subtle"
                            (change)="onOrderIdChange($any($event.target).value)">
                            <option value="" selected>-- Select Order Id --</option>
                            @for (item of projectIdList; track item) {
                            <option [value]="item">{{ item }}</option>
                            }
                        </select>
                    </div>
                    <button class="btn btn-primary btn-sm px-4 ms-2" (click)="processOrder()">
                        Process
                    </button>
                    <button class="btn btn-link btn-sm px-0 ms-2 text-decoration-none" (click)="newCollerEntryShow()" >
                        Add New Entry
                    </button>


                </div>
            </div>
        </div>
    </div>
    }

    <!-- @else if(!isShowCoolerEntry()){
        <div class="show-cooler-entry">
            <div class="cooler-entry-content">
                <div class="text-center p-4 border rounded bg-white shadow-sm">

                        </button>
                    </div>
                </div>
            </div>
        </div>

     @else {
    <div class="row  text-center justify-content-center p-4  border rounded p-4 bg-white shadow-sm">
        <div class="col-md-5">
            <h5 class="text-primary border-bottom pb-2 mb-4">Cooler Order Information</h5>

            <div class="row mb-3 align-items-center">
                <label class="col-sm-4 small fw-semibold text-end">Order ID :</label>
                <div class="col-sm-8">
                    <input type="text" [value]="newCoolerEntryId"
                        class="form-control form-control-sm border-dark-subtle bg-light" readonly>
                </div>
            </div>

            <div class="row mb-3 align-items-center">
                <label class="col-sm-4 small fw-semibold text-end">Order Date :</label>
                <div class="col-sm-8">
                    <input type="text" [value]="newOrderDate | date: 'MMM dd, yyyy, hh:mm a'"
                        class="form-control form-control-sm border-dark-subtle bg-light" readonly>
                </div>
            </div>

            <div class="row mb-3 align-items-center">
                <label class="col-sm-4 small fw-semibold text-end">Customer ID :</label>
                <div class="col-sm-8">
                    <input type="text" value="CUST-1001"
                        class="form-control form-control-sm border-dark-subtle bg-light" >
                </div>
            </div>

            <hr>
            <div class="text-center mt-3">
                <button class="btn btn-outline-danger btn-sm px-5" (click)="newCoolerEntryHide()">
                    <i class="bi bi-arrow-left"></i> Back
                </button>
            </div>
        </div>
    </div>
    }
